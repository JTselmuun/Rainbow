<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Rainbow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <main class="auth-shell">
    <section class="auth-brand" aria-hidden="true">
      <p class="auth-kicker">Storybook Access</p>
      <h1>Rainbow</h1>
      <p class="auth-quote">Somewhere between rain and sunlight, a story begins.</p>
    </section>

    <section class="auth-card" aria-labelledby="login-title">
      <h2 id="login-title">Welcome Back</h2>
      <p class="auth-subtitle">Sign in to open <em>Rainbow</em> and continue the story.</p>

      <label class="auth-label" for="username">Username</label>
      <input type="text" id="username" class="auth-input" placeholder="Username" autocomplete="username" />

      <label class="auth-label" for="password">Password</label>
      <input type="password" id="password" class="auth-input" placeholder="Password" autocomplete="current-password" />

      <button class="auth-button" type="button" onclick="login()">Enter Book</button>
      <p id="error" class="auth-error" role="alert"></p>
    </section>
  </main>

  <script>
    document.getElementById("password")?.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        login();
      }
    });

    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      const correctUser = "reader";
      const correctPass = "1234";

      if (user === correctUser && pass === correctPass) {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "home.html";
      } else {
        document.getElementById("error").innerText = "Wrong username or password.";
      }
    }
  </script>
</body>
</html>
