<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Rainbow</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="auth-page">
  <main class="auth-card" aria-labelledby="login-title">
    <h2 id="login-title">Private Book Access</h2>
    <p class="auth-subtitle">Sign in to open <em>Rainbow</em>.</p>

    <label class="auth-label" for="username">Username</label>
    <input type="text" id="username" class="auth-input" placeholder="Username" autocomplete="username" />

    <label class="auth-label" for="password">Password</label>
    <input type="password" id="password" class="auth-input" placeholder="Password" autocomplete="current-password" />

    <button class="auth-button" type="button" onclick="login()">Enter</button>
    <p id="error" class="auth-error" role="alert"></p>
  </main>

  <script>
    function login() {
      const user = document.getElementById("username").value;
      const pass = document.getElementById("password").value;

      const correctUser = "reader";
      const correctPass = "1234";

      if (user === correctUser && pass === correctPass) {
        localStorage.setItem("loggedIn", "true");
        window.location.href = "home.html";
      } else {
        document.getElementById("error").innerText = "Wrong ID or password";
      }
    }
  </script>
</body>
</html>
